[Addon]
Name=fcitx5-voice-input
Category=InputMethod
Configurable=true

[Config/TriggerKey]
Type=Key
DefaultValue=Alt_R
Description=录音触发键

[Config/Model]
Type=Enum
DefaultValue=
Description=ASR 模型
# 选项在 addon 启动时动态填充：扫描 /usr/share/fcitx5-voice-input/models/*/metadata.json
# 格式: <模型 ID>

[Config/Scene]
Type=Enum
DefaultValue=__raw__
Description=场景（原文/纠错/翻译）
# 选项: __raw__ (原文), __correct__ (纠错), 可扩展
