name: Build fcitx5-voice-input
description: Install deps, configure, compile, and package DEB

inputs:
  build_type:
    description: CMake build type
    required: false
    default: Release

outputs:
  deb_path:
    description: Path to the built DEB package
    value: ${{ steps.deb.outputs.path }}

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libfcitx5core-dev \
          libpipewire-0.3-dev libspa-0.2-dev \
          libpulse-dev \
          gettext \
          libjsoncpp-dev \
          libcurl4-openssl-dev \
          dpkg-dev

    - name: Install ONNX Runtime
      shell: bash
      run: |
        ONNX_VER=1.20.1
        ONNX_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VER}/onnxruntime-linux-x64-${ONNX_VER}.tgz"
        curl -fsSL "$ONNX_URL" -o /tmp/onnxruntime.tgz
        tar -xzf /tmp/onnxruntime.tgz -C /tmp
        echo "ONNXRUNTIME_ROOT=/tmp/onnxruntime-linux-x64-${ONNX_VER}" >> $GITHUB_ENV

    - name: Configure
      shell: bash
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DCMAKE_INSTALL_PREFIX=/usr -DONNXRUNTIME_ROOT="${ONNXRUNTIME_ROOT}"

    - name: Compile
      shell: bash
      run: cmake --build build -j"$(nproc)"

    - name: Package DEB
      id: deb
      shell: bash
      run: |
        cd build
        export LD_LIBRARY_PATH="${ONNXRUNTIME_ROOT}/lib:${LD_LIBRARY_PATH}"
        cpack -G DEB
        mv *.deb ../
        cd ..
        echo "::group::DEB info"
        dpkg-deb --info *.deb
        echo "::endgroup::"
        DEB_FILE=$(ls *.deb | head -1)
        echo "path=${DEB_FILE}" >> $GITHUB_OUTPUT
