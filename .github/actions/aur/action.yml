name: Package AUR source
description: Prepare Arch Linux source tarball and build .pkg.tar.zst

outputs:
  pkgfile:
    description: Path to the built Arch package
    value: ${{ steps.build.outputs.pkgfile }}
  tarball:
    description: Path to the AUR source tarball
    value: ${{ steps.prepare.outputs.tarball }}
  pkgbuild:
    description: Path to the generated PKGBUILD
    value: ${{ steps.prepare.outputs.pkgbuild }}

runs:
  using: composite
  steps:
    - name: Prepare AUR source
      id: prepare
      shell: bash
      run: bash "${{ github.action_path }}/prepare.sh"

    - name: Build Arch package
      id: build
      shell: bash
      run: bash "${{ github.action_path }}/build.sh"
