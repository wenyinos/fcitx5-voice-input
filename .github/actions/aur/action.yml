name: Package AUR source
description: Prepare Arch Linux source tarball and build .pkg.tar.zst

outputs:
  pkgfile:
    description: Path to the built Arch package
    value: ${{ steps.build.outputs.pkgfile }}
  tarball:
    description: Path to the AUR source tarball
    value: ${{ steps.prepare.outputs.tarball }}
  pkgbuild:
    description: Path to the generated PKGBUILD
    value: ${{ steps.prepare.outputs.pkgbuild }}

runs:
  using: composite
  steps:
    - name: Prepare AUR source
      id: prepare
      shell: bash
      run: |
        TAG=${GITHUB_REF_NAME}
        VER=${TAG#v}
        PKG="fcitx5-voice-input"

        mkdir -p dist/aur/src

        # Source tarball with submodules (top dir = pkgname for makepkg)
        mkdir -p "${PKG}"
        git archive HEAD | tar -x -C "${PKG}"
        cp -a third_party "${PKG}/"
        tar -czf "dist/aur/src/${PKG}-${VER}.tar.gz" "${PKG}"
        rm -rf "${PKG}"

        # PKGBUILD with version and sha256
        SHA256=$(sha256sum "dist/aur/src/${PKG}-${VER}.tar.gz" | cut -d' ' -f1)
        sed -e "s/pkgver=.*/pkgver=${VER}/" \
            -e "s/sha256sums=('SKIP')/sha256sums=('${SHA256}')/" \
            aur/PKGBUILD > dist/aur/PKGBUILD

        echo "tarball=dist/aur/src/${PKG}-${VER}.tar.gz" >> $GITHUB_OUTPUT
        echo "pkgbuild=dist/aur/PKGBUILD" >> $GITHUB_OUTPUT

    - name: Build Arch package
      id: build
      shell: bash
      run: |
        PKG="fcitx5-voice-input"
        mkdir -p dist/aur/pkg

        # Copy PKGBUILD and source tarball into a build directory
        cp dist/aur/PKGBUILD "dist/aur/pkg/"
        cp dist/aur/src/*.tar.gz "dist/aur/pkg/"

        # Build Docker image
        docker build -t arch-builder "${{ github.action_path }}"

        # Run build
        docker run --rm \
          -v "$PWD/dist/aur/pkg:/build" \
          arch-builder

        # Copy the built .pkg.tar.zst out
        PKGFILE=$(ls dist/aur/pkg/*.pkg.tar.zst 2>/dev/null | head -1)
        if [ -n "$PKGFILE" ]; then
          cp "$PKGFILE" dist/aur/
          echo "pkgfile=${PKGFILE}" >> $GITHUB_OUTPUT
        else
          echo "pkgfile=" >> $GITHUB_OUTPUT
        fi
