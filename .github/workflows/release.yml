name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/build

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  rpm:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora44
            image: fedora:44
          - target: rhel10
            image: registry.access.redhat.com/ubi9:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build RPM (${{ matrix.target }})
        run: |
          VER="${GITHUB_REF_NAME#v}"
          PKG="fcitx5-voice-input"

          # Source tarball with submodule content
          mkdir -p "/tmp/${PKG}-${VER}"
          git archive HEAD | tar -x -C "/tmp/${PKG}-${VER}"
          cp -a third_party/silero-vad "/tmp/${PKG}-${VER}/third_party/"
          cd /tmp && tar czf "${OLDPWD}/${PKG}-${VER}.tar.gz" "${PKG}-${VER}"
          cd "${OLDPWD}" && rm -rf "/tmp/${PKG}-${VER}"

          mkdir -p rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          cp "${PKG}-${VER}.tar.gz" rpmbuild/SOURCES/
          sed "s/^Version:.*/Version:        ${VER}/" \
            rpm/fcitx5-voice-input.spec > rpmbuild/SPECS/fcitx5-voice-input.spec

          docker run --rm \
            -v "${PWD}/rpmbuild:/root/rpmbuild" \
            ${{ matrix.image }} \
            bash -c "
              set -e
              if command -v dnf &>/dev/null; then
                PKG_MGR=dnf
              else
                PKG_MGR=yum
              fi
              \$PKG_MGR install -y rpm-build rpmdevtools cmake gcc-c++ make \
                fcitx5-devel pipewire-devel pulseaudio-libs-devel \
                jsoncpp-devel libcurl-devel onnxruntime-devel gettext 2>/dev/null || true
              rpmbuild -ba /root/rpmbuild/SPECS/fcitx5-voice-input.spec
            "

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.target }}
          path: rpmbuild/RPMS/**/*.rpm

  release:
    needs: [deb, rpm]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -name '*.deb' -exec cp {} release/ \;
          find artifacts -name '*.rpm' -exec cp {} release/ \;

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
