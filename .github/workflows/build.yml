name: build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'
          if-no-files-found: warn

  aur:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/aur

      - uses: actions/upload-artifact@v4
        with:
          name: aur-package
          path: |
            dist/aur/*.tar.gz
            dist/aur/*.pkg.tar.zst
            dist/aur/PKGBUILD
          if-no-files-found: warn

  rpm:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora44
            image: fedora:44
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep -oP 'project\([^ ]+ +VERSION +\K[^ )]+' CMakeLists.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build RPM (${{ matrix.target }})
        run: |
          VER="${{ steps.ver.outputs.version }}"
          PKG="fcitx5-voice-input"

          # Source tarball with submodule content
          mkdir -p "/tmp/${PKG}-${VER}"
          git archive HEAD | tar -x -C "/tmp/${PKG}-${VER}"
          cp -a third_party/silero-vad "/tmp/${PKG}-${VER}/third_party/"
          cd /tmp && tar czf "${OLDPWD}/${PKG}-${VER}.tar.gz" "${PKG}-${VER}"
          cd "${OLDPWD}" && rm -rf "/tmp/${PKG}-${VER}"

          # Prepare rpmbuild tree
          mkdir -p rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          cp "${PKG}-${VER}.tar.gz" rpmbuild/SOURCES/

          # Spec with correct version
          sed "s/^Version:.*/Version:        ${VER}/" \
            rpm/fcitx5-voice-input.spec > rpmbuild/SPECS/fcitx5-voice-input.spec

          # Build in Docker
          docker run --rm \
            -v "${PWD}/rpmbuild:/root/rpmbuild" \
            -v "${PWD}/third_party:/src/third_party:ro" \
            ${{ matrix.image }} \
            bash -c "
              set -e
              if command -v dnf &>/dev/null; then
                PKG_MGR=dnf
              else
                PKG_MGR=yum
              fi
              \$PKG_MGR install -y rpm-build rpmdevtools cmake gcc-c++ make \
                fcitx5-devel pipewire-devel pulseaudio-libs-devel \
                jsoncpp-devel libcurl-devel onnxruntime-devel gettext 2>/dev/null || true
              rpmbuild -ba /root/rpmbuild/SPECS/fcitx5-voice-input.spec
            "

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.target }}
          path: rpmbuild/RPMS/**/*.rpm
          if-no-files-found: warn
