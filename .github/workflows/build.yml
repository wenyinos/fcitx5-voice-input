name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libfcitx5core-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            nlohmann-json3-dev \
            libcurl4-openssl-dev \
            dpkg-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j"$(nproc)"

      # ─── DEB package ──────────────────────────────────────────────────────
      - name: Build DEB package
        run: |
          cd build
          cpack -G DEB
          mv *.deb ../
          cd ..
          echo "::group::DEB info"
          dpkg-deb --info *.deb
          echo "::endgroup::"

      # ─── Arch package ─────────────────────────────────────────────────────
      - name: Build Arch package (Docker)
        run: |
          mkdir -p /tmp/archpkg

          git archive --prefix=fcitx5-voice-input-0.1.0/ \
            -o /tmp/archpkg/fcitx5-voice-input-0.1.0.tar.gz HEAD

          cp aur/PKGBUILD /tmp/archpkg/

          docker run --rm -v /tmp/archpkg:/build archlinux:latest bash -c "
            set -eux
            pacman -Syu --noconfirm base-devel cmake pkg-config \
              fcitx5 pipewire nlohmann-json curl

            cd /build
            useradd -m builder
            chown -R builder:builder /build
            su builder -c 'cd /build && makepkg -f --noconfirm'
          "

          cp /tmp/archpkg/*.pkg.tar.zst . 2>/dev/null || true
          echo "::group::Arch package"
          ls -lh *.pkg.tar.zst 2>/dev/null || echo '(no Arch package)'
          echo "::endgroup::"

      # ─── Upload artifacts ────────────────────────────────────────────────
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            *.deb
            *.pkg.tar.zst
          if-no-files-found: warn
