name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build
      - uses: ./.github/actions/aur

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            *.deb
            dist/aur/*.tar.gz
            dist/aur/PKGBUILD
          if-no-files-found: warn
